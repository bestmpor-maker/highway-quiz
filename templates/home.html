<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highway Quiz</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>แบบทดสอบ Highway Engineering</h1>
      <p class="muted">ทำข้อสอบทีละ 1 ข้อ ตอบแล้วรู้ผลทันที พร้อมคำอธิบาย</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert error">
            {% for message in messages %}
              <div>{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('login') }}" method="post" class="stack">
        <label for="access_code">รหัสยืนยัน</label>
        <input type="password" id="access_code" name="access_code" placeholder="กรอกรหัสเพื่อเริ่มทำข้อสอบ" required>
        <button type="submit">เริ่มทำข้อสอบ</button>
      </form>

      <div class="note">
        <strong>รหัสตัวอย่าง:</strong> HIGHWAY2026
      </div>
    </div>
  </div>
</body>
</html>
